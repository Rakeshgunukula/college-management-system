<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>
<style>
/* ===== RESET & BASE ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    overflow-x:hidden;
    position:relative;
}

/* ===== MIRROR GLOW ===== */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(120px);
    opacity:0.6;
    animation:float 8s infinite alternate;
    z-index:0;
}

@keyframes float{
    0%{transform:translate(0,0);}
    100%{transform:translate(150px,150px);}
}

/* ===== HEADER (FIXED NAVBAR & SIDEBAR BASE) ===== */
.sidebar {
    position: fixed;
    top: 0;
    left: -260px; /* Mobile hide */
    width: 250px;
    height: 100%;
    background: rgba(15, 32, 39, 0.95);
    backdrop-filter: blur(20px);
    z-index: 2000;
    transition: 0.4s ease;
    padding: 20px;
}

.sidebar.active {
    left: 0;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    height: 70px;
    padding: 0 20px;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1500;
    background: rgba(15, 32, 39, 0.8);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.menu-btn {
    font-size: 24px;
    cursor: pointer;
    z-index: 1600;
}

/* ===== SIDEBAR LINKS ===== */
.sidebar ul { list-style: none; margin-top: 50px; }
.sidebar ul li {
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sidebar ul li:hover { background: rgba(255,255,255,0.1); }

/* ===== MAIN CONTENT ===== */
.main {
    padding: 20px;
    padding-top: 90px; /* Space for fixed navbar */
    position: relative;
    z-index: 1;
}

/* ===== CARDS ===== */
.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 25px;
    max-width: 100px;
    padding:20px;
    margin: auto;
    transition: all .8s ease;
}

.cards.active{
    gap:15px;
    max-width: 100%;
}
.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    padding: 18px;
    overflow: hidden;
    border-radius:15px;
    border: 1px solid rgba(255,255,255,0.2);
    transition: .3s ease;
}

.cards .card.active{
    border-radius:15px;
    transition: all .8s ease;

}
.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 15px rgba(0,198,255,0.4);
}

/* ===== TABLE ===== */
.table-container {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    padding: 18px;
    border-radius: 15px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th, td {
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
}

.status { padding: 4px 10px; border-radius: 20px; font-size: 11px; }
.completed { background: #16a34a; }
.pending { background: #f59e0b; }

#overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: none; z-index: 1800;
}
#overlay.active { display: block; }

/* ===== DESKTOP VIEW (min-width: 868px) ===== */
@media(min-width: 868px) {
    .navbar {
        justify-content: space-between;
        padding: 0 40px;
    }

    .menu-btn { display: none; }

    /* Top Left Welcome Text */
    .navbar h2 {
        display: block !important;
        font-size: 20px;
    }

    /* Horizontal Sidebar/Menu in Header */
    .sidebar {
        position: fixed;
        left: auto;
        right: 40px;
        top: 0;
        width: auto;
        height: 70px;
        background: transparent;
        backdrop-filter: none;
        display: flex;
        align-items: center;
        z-index: 1700;
    }

    .sidebar ul {
        display: flex;
        flex-direction: row;
        margin-top: 0;
        gap: 15px;
    }

    .sidebar ul li {
        border-bottom: none;
        padding: 8px 15px;
        margin-bottom: 0;
    }

    .sidebar h2 { display: none; }

    .main {
        padding-top: 100px;
        max-width: 1200px;
        margin: 0 auto;
    }
}
</style>
</head>
<body>

<div class="navbar">
    <div class="menu-btn" id="menuBtn">☰</div>
    <h2 id="profileUpdate">👩‍🏫</h2>
</div>

<div class="sidebar" id="sidebar">
    <ul>
        <li>Dashboard</li>
        <li>Assignments</li>
        <li>Attendance</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div id="overlay"></div>

<div class="main">
    <div class="cards">
        <div class="card">
            <h3 id="studentCgpa"></h3>
            <p id="studentMarks">0</p>
        </div>
        <div class="card">
            <h3>Assignments Marks</h3>
            <p id="assignmentMarks">0</p>
        </div>
        <div class="card">
            <h3>Attendance</h3>
            <p id="attendance">3</p>
        </div>
        <div class="card">
            <h3>Review</h3>
            <p id="review"></p>
        </div>
    </div>

    <div class="table-container">
        <h3 style="margin-bottom:15px;">Recent Assignments</h3>
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Roll No</th>
                    <th>Branch</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="studentname"></td>
                    <td id="rollno">10th Grade</td>
                    <td id="branch"><span class="status completed">Completed</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="students.js"></script>
</body>
</html>
