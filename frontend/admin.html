<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
/* ===== RESET & BASE ===== */
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ min-height:100vh; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:#fff; overflow-x:hidden; position:relative; }

/* ===== MIRROR GLOW ===== */
body::before{ content: ""; position: absolute; width: 400px; height: 400px; border-radius: 50%; top: -120px; left: -120px; filter: blur(120px); opacity: 0.6; animation: float 8s infinite alternate; z-index: 0; }
@keyframes float{ 0%{transform:translate(0,0);} 100%{transform:translate(150px,150px);} }

/* ===== HEADER & NAVIGATION ===== */
.navbar {
    display: flex; justify-content: space-between; align-items: center;
    position: fixed; height: 70px; padding: 0 20px; top: 0; left: 0; width: 100%;
    z-index: 1500; background: rgba(15, 32, 39, 0.85); backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.menu-btn { font-size: 24px; cursor: pointer; z-index: 1600; }

.sidebar {
    position: fixed; top: 0; left: -260px; width: 250px; height: 100%;
    background: rgba(15, 32, 39, 0.95); backdrop-filter: blur(20px);
    z-index: 2000; transition: 0.4s ease; padding: 20px;
}
.sidebar.active { left: 0; }
.sidebar h2 { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
.sidebar ul { list-style: none; }
.sidebar ul li { padding: 14px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar ul li:hover { background: rgba(255,255,255,0.1); }

/* ===== MAIN CONTENT ===== */
.main { padding: 20px; padding-top: 90px; position: relative; z-index: 1; }
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
.card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }

/* Forms & Containers */
.createTeachersContainer, .table-container { 
    background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); 
    padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); 
}
#createTeachersForm { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
#createTeachersForm input { padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; outline: none; }
#createTeachersForm button { background: #16a34a; color: #fff; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

/* Tables */
.tables-wrapper { display: flex; flex-direction: column; gap: 20px; }
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
th, td { padding: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }

#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1800; }
#overlay.active { display: block; }
.removeBtn{
    background:red;
    padding:8px;
    color:white;
    border:none;
    border-radius:10px;
}
.makeAdmin{
    background:#16a34a;
    padding:8px;
    border:none;
    border-radius:10px;
    color:white;
    font-weight: bold;

}
.removeBtn:hover, .makeAdmin:hover{
    cursor: pointer;
    opacity:0.7;
}
/* ===== DESKTOP VIEW ===== */
@media(min-width: 868px) {
    .navbar { justify-content: space-between; padding: 0 40px; }
    .menu-btn { display: none; }
    .navbar h2 { display: block !important; font-size: 22px; }

    .sidebar {
        position: fixed; left: auto; right: 40px; top: 0; width: auto; height: 70px;
        background: transparent; backdrop-filter: none; display: flex; align-items: center; z-index: 1700;
    }
    .sidebar h2 { display: none; }
    .sidebar ul { display: flex; flex-direction: row; margin-top: 0; gap: 15px; }
    .sidebar ul li { border-bottom: none; padding: 8px 15px; margin-bottom: 0; }
    
    .main { padding-top: 100px; max-width: 1200px; margin: 0 auto; }
    .cards { grid-template-columns: repeat(4, 1fr); }
    .tables-wrapper{
        display: grid;
        grid-template-columns: 1fr 1fr;
    }
}
</style>
</head>
<body>

<div class="navbar">
    <div class="menu-btn" id="menuBtn">☰</div>
    <h2>Welcome Admin 👑</h2>
</div>

<div class="sidebar" id="sidebar">
    <h2>Admin Panel</h2>
    <ul>
        <li>Dashboard</li>
        <li>Students</li>
        <li>Teachers</li>
        <li>Settings</li>
        <li id="logout">Logout</li>
    </ul>
</div>

<div id="overlay"></div>

<div class="main">
    <div class="cards">
        <div class="card"><h3>Total Students</h3><p id="students">0</p></div>
        <div class="card"><h3>Total Teachers</h3><p id="teachers">0</p></div>
        <div class="card"><h3>Active Courses</h3><p>18</p></div>
        <div class="card"><h3>Requests</h3><p>5</p></div>
    </div>

    <div class="createTeachersContainer">
        <h2>Create Teachers</h2>
        <form id="createTeachersForm">
            <input type="text" placeholder="name" id="teacherName" required>
            <input type="email" placeholder="email" id="teacherEmail" required>
            <input type="password" placeholder="password" id="teacherPassword" required>
            <button type="submit">Create</button>
        </form>
    </div>

    <div class="tables-wrapper">
        <div class="table-container">
            <h3>Teacher's Table</h3>
            <table id="teachersTable">
                <thead><tr><th>Name</th><th>Email</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3>Student's Table</h3>
            <table id="studentsTable">
                <thead><tr><th>Name</th><th>Roll No</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
