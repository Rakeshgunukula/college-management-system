<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>
<style>
/* ... (Base Styles Same as Admin) ... */
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ min-height:100vh; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:#fff; position:relative; overflow-x:hidden; }
body::before{ content:""; position:absolute; width:400px; height:400px; border-radius:50%; top:-120px; left:-120px; filter:blur(120px); opacity:0.6; animation:float 8s infinite alternate; z-index:0; }
@keyframes float{ 0%{transform:translate(0,0);} 100%{transform:translate(150px,150px);} }

.navbar { display: flex; justify-content: space-between; align-items: center; position: fixed; height: 80px; padding: 0 20px; top: 0; left: 0; width: 100%; z-index: 1500; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
.menu-btn { font-size: 24px; cursor: pointer; }
.sidebar { position: fixed; top: 0; left: -260px; width: 250px; height: 100%; background: rgba(15,32,39,0.95); backdrop-filter: blur(20px); z-index: 2000; transition: 0.4s ease; padding: 20px; }
.sidebar.active { left: 0; }
.sidebar ul { list-style: none; margin-top: 50px; }
.sidebar ul li { padding: 14px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar ul li:hover{
    background:rgba(0,0,0,0.5);
}
.main { padding: 20px; padding-top: 100px; position: relative; z-index: 1; transition: all .8s ease; top:-400px; transform: scale(0);}
.main.active {
    top:0;
    transform:scale(1);
}
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; transform:translateY(300px) scale(0); opacity: 0; transition: all 1s ease;}
.cards.active{
    transform: translateY(0) scale(1);
    opacity: 1;
}

.card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }

.addstudents { background: transparent; border: 1px solid rgba(255,255,255,0.2); padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
#addStudentForm { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
#addStudentForm input { padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 5px; outline: none; }
#addStudentForm button { padding: 12px; background: #16a34a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

.table-container { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 18px; border-radius: 15px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 12px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }

#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1800; }
#overlay.active { display: block; }

@media(min-width: 868px) {
    .menu-btn { display: none; }
    .sidebar { position: fixed; left: auto; right: 20px; top: 0; width: auto; height: 80px; background: transparent; backdrop-filter: none; display: flex; align-items: center; z-index: 1700; }
    .sidebar ul { display: flex; flex-direction: row; margin-top: 0; gap: 15px; }
    .sidebar ul li { border-bottom: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; }
    .main { max-width: 1200px; margin: 0 auto; padding-top: 110px; }
    .cards { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>
<div class="navbar">
    <div class="menu-btn" id="menuBtn">☰</div>
    <h2>Welcome Teacher 👩‍🏫</h2>
</div>
<div class="sidebar" id="sidebar">
    <ul>
        <li>Dashboard</li>
        <li>My Classes</li>
        <li>Assignments</li>
        <li>Attendance</li>
        <li id="logout">Logout</li>
    </ul>
</div>
<div id="overlay"></div>
<div class="main">
    <div class="cards">
        <div class="card"><h3>Total Students</h3><p id="studentCount">0</p></div>
        <div class="card"><h3>Assignments</h3><p id="assignmentCount">0</p></div>
        <div class="card"><h3>Classes Today</h3><p>3</p></div>
        <div class="card"><h3>Pending Reviews</h3><p>7</p></div>
    </div>
    <div class="addstudents">
        <h2>Add Students</h2>
        <form id="addStudentForm">
            <input type="text" placeholder="name" id="studentname" required>
            <input type="tel" placeholder="Enter roll no" id="rollno" required>
            <input type="password" placeholder="password" id="studentpassword" required>
            <input type="text" placeholder="Enter Branch" id="branch" required>
            <button type="submit">Add</button>
        </form>
    </div>
    <div class="table-container">
        <h3 style="margin-bottom:10px; text-align: center;">Students Collection</h3>
        <table id="studentsTable">
            </table>
    </div>
</div>
<script src="teacher.js"></script>
</body>
</html>
